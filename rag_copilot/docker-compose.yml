services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/collections >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: rag_opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      - plugins.security.disabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 60
      start_period: 120s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: rag_os_dashboards
    depends_on:
      - opensearch
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
    ports:
      - "5601:5601"

  api:
    build:
      context: .
      dockerfile: dockerfile.api
    container_name: rag_api
    env_file:
      - .env
    environment:
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION}
      - OPENSEARCH_URL=${OPENSEARCH_URL}
      - OPENSEARCH_INDEX=${OPENSEARCH_INDEX}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_EMBED_MODEL=${OPENAI_EMBED_MODEL}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL}
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - opensearch
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  ui:
    build:
      context: .
      dockerfile: dockerfile.ui
    container_name: rag_ui
    environment:
      - API_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  qdrant_data:
  opensearch_data: