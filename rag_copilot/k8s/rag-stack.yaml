apiVersion: v1
kind: Namespace
metadata:
  name: rag

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc
  namespace: rag
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opensearch-pvc
  namespace: rag
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          ports:
            - containerPort: 6333
            - containerPort: 6334
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
          readinessProbe:
            httpGet:
              path: /collections
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /collections
              port: 6333
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: qdrant-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: rag
spec:
  type: ClusterIP
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch
  namespace: rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.13.0
          ports:
            - containerPort: 9200
          env:
            - name: discovery.type
              value: "single-node"
            - name: bootstrap.memory_lock
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms1g -Xmx1g"
            - name: plugins.security.disabled
              value: "true"
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              value: "ChangeThisStrongPassword123!"
          volumeMounts:
            - name: opensearch-storage
              mountPath: /usr/share/opensearch/data
          readinessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 90
            periodSeconds: 20
      volumes:
        - name: opensearch-storage
          persistentVolumeClaim:
            claimName: opensearch-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: rag
spec:
  type: ClusterIP
  selector:
    app: opensearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
    spec:
      containers:
        - name: rag-api
          image: 699335010075.dkr.ecr.eu-west-2.amazonaws.com/rag-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: QDRANT_URL
              value: "http://qdrant:6333"
            - name: OPENSEARCH_URL
              value: "http://opensearch:9200"
            - name: QDRANT_COLLECTION
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: QDRANT_COLLECTION
            - name: OPENSEARCH_INDEX
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: OPENSEARCH_INDEX
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_EMBED_MODEL
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: OPENAI_EMBED_MODEL
            - name: OPENAI_CHAT_MODEL
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: OPENAI_CHAT_MODEL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: rag-api
  namespace: rag
spec:
  type: ClusterIP
  selector:
    app: rag-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-ui
  namespace: rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-ui
  template:
    metadata:
      labels:
        app: rag-ui
    spec:
      containers:
        - name: rag-ui
          image: 699335010075.dkr.ecr.eu-west-2.amazonaws.com/rag-ui:latest
          ports:
            - containerPort: 8501
          env:
            - name: API_URL
              value: "http://rag-api:8000"
          readinessProbe:
            tcpSocket:
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: rag-ui
  namespace: rag
spec:
  type: LoadBalancer
  selector:
    app: rag-ui
  ports:
    - name: http
      port: 80
      targetPort: 8501
